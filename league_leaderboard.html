<style>

  .msg { font-family: 'Lato', sans-serif; font-size: 11px; padding: 12px 16px; margin-bottom: 16px; display: none; }

</style>

<script>
const SUPABASE_URL = 'https://znqnnaslskjewfxcswxw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0pVZp5JcAc9lSIClZD5eqQ_9Q33F7Uf';

function api(path, options = {}) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...options.headers
    }
  });
}

const ALL_HOLES = [
  { num: 1,  name: 'Omen',       par: 4, hdcp: 7  },
  { num: 2,  name: 'Hemlock',    par: 3, hdcp: 15 },
  { num: 3,  name: 'Badlands',   par: 5, hdcp: 3  },
  { num: 4,  name: 'Sentinel',   par: 4, hdcp: 11 },
  { num: 5,  name: 'Strangle',   par: 4, hdcp: 1  },
  { num: 6,  name: 'Rhumba',     par: 3, hdcp: 17 },
  { num: 7,  name: 'Flicker',    par: 5, hdcp: 5  },
  { num: 8,  name: 'Balderdash', par: 4, hdcp: 9  },
  { num: 9,  name: 'Darkfall',   par: 4, hdcp: 13 },
  { num: 10, name: 'Harbinger',  par: 4, hdcp: 6  },
  { num: 11, name: 'Exile',      par: 3, hdcp: 16 },
  { num: 12, name: 'Shroud',     par: 5, hdcp: 2  },
  { num: 13, name: 'Lure',       par: 4, hdcp: 10 },
  { num: 14, name: 'Obscura',    par: 4, hdcp: 12 },
  { num: 15, name: 'Mercy',      par: 4, hdcp: 4  },
  { num: 16, name: 'Dirge',      par: 3, hdcp: 18 },
  { num: 17, name: 'Rotwind',    par: 5, hdcp: 8  },
  { num: 18, name: 'Reckoning',  par: 4, hdcp: 14 },
];

function buildHoleSequence(startHole) {
  const seq = [];
  for (let i = 0; i < 9; i++) {
    const idx = ((startHole - 1 + i) % 18);
    seq.push(ALL_HOLES[idx]);
  }
  return seq;
}

function getStrokesOnHole(strokesOff, holeHdcp, nineHoles) {
  if (strokesOff <= 0) return 0;
  const sorted = [...nineHoles].sort((a, b) => a.hdcp - b.hdcp);
  const strokeHoles = sorted.slice(0, Math.min(strokesOff, 9)).map(h => h.hdcp);
  return strokeHoles.includes(holeHdcp) ? 1 : 0;
}

function calcResults(match, players, scores, holeSeq) {
  const teamA = players.filter(p => p.team === 'A');
  const teamB = players.filter(p => p.team === 'B');

  let lbA = 0, lbB = 0, lbT = 0;
  let lhA = 0, lhB = 0, lhT = 0;
  const holeDetails = [];

  holeSeq.forEach(hole => {
    const aNet = teamA.map(p => scores[`${p.id}_${hole.num}`]?.net);
    const bNet = teamB.map(p => scores[`${p.id}_${hole.num}`]?.net);
    const aComplete = aNet.every(n => n !== undefined && n !== null);
    const bComplete = bNet.every(n => n !== undefined && n !== null);

    const detail = { hole, aNet, bNet, lbWinner: null, lhWinner: null };

    if (aComplete && bComplete) {
      const aMin = Math.min(...aNet), bMin = Math.min(...bNet);
      if (aMin < bMin) { lbA++; detail.lbWinner = 'A'; }
      else if (bMin < aMin) { lbB++; detail.lbWinner = 'B'; }
      else { lbT++; detail.lbWinner = 'T'; }

      const aSum = aNet.reduce((a,b)=>a+b,0), bSum = bNet.reduce((a,b)=>a+b,0);
      detail.aSum = aSum; detail.bSum = bSum;
      if (aSum < bSum) { lhA++; detail.lhWinner = 'A'; }
      else if (bSum < aSum) { lhB++; detail.lhWinner = 'B'; }
      else { lhT++; detail.lhWinner = 'T'; }
    }
    holeDetails.push(detail);
  });

  let ptA = 0, ptB = 0;

  // Low Ball
  if (lbA > lbB) ptA += 1;
  else if (lbB > lbA) ptB += 1;
  else if (lbA + lbB + lbT > 0) { ptA += 0.5; ptB += 0.5; }

  // Low Hole
  if (lhA > lhB) ptA += 1;
  else if (lhB > lhA) ptB += 1;
  else if (lhA + lhB + lhT > 0) { ptA += 0.5; ptB += 0.5; }

  // Team Net
  const allScored = holeSeq.every(h => players.every(p => scores[`${p.id}_${h.num}`] !== undefined));
  let aTotalNet = null, bTotalNet = null, tnWinner = null;
  if (allScored) {
    aTotalNet = teamA.reduce((sum, p) => sum + holeSeq.reduce((s, h) => s + (scores[`${p.id}_${h.num}`]?.net || 0), 0), 0);
    bTotalNet = teamB.reduce((sum, p) => sum + holeSeq.reduce((s, h) => s + (scores[`${p.id}_${h.num}`]?.net || 0), 0), 0);
    if (aTotalNet < bTotalNet) { ptA += 1; tnWinner = 'A'; }
    else if (bTotalNet < aTotalNet) { ptB += 1; tnWinner = 'B'; }
    else { ptA += 0.5; ptB += 0.5; tnWinner = 'T'; }
  }

  let lbWinner = lbA > lbB ? 'A' : (lbB > lbA ? 'B' : 'T');
  let lhWinner = lhA > lhB ? 'A' : (lhB > lhA ? 'B' : 'T');
  let overallWinner = ptA > ptB ? 'A' : (ptB > ptA ? 'B' : 'T');

  return { ptA, ptB, lbA, lbB, lbT, lhA, lhB, lhT, lbWinner, lhWinner, tnWinner, aTotalNet, bTotalNet, overallWinner, holeDetails, allScored };
}

function chip(winner, team) {
  if (winner === 'T') return `<span class="point-chip half">½ Pt</span>`;
  return winner === team
    ? `<span class="point-chip won">1 Pt</span>`
    : `<span class="point-chip lost">0 Pts</span>`;
}

async function loadByCode() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const msgEl = document.getElementById('lookupMsg');
  if (code.length !== 3) {
    msgEl.textContent = 'Please enter a 3-character match code.';
    msgEl.className = 'msg error show';
    return;
  }
  msgEl.className = 'msg';
  document.querySelector('.loading-card').innerHTML = '<div class="loading-text">Loading…</div>';

  try {
    const res = await api(`league_matches?code=eq.${code}&select=*`);
    const matches = await res.json();
    if (!matches.length) {
      msgEl.textContent = 'Match not found. Check the code and try again.';
      msgEl.className = 'msg error show';
      document.querySelector('.loading-card').innerHTML = '<div class="loading-text">No match found.</div>';
      return;
    }
    await renderResults(matches[0].id);
  } catch(err) {
    msgEl.textContent = 'Could not connect. Try again.';
    msgEl.className = 'msg error show';
  }
}

async function renderResults(matchId) {
  try {
    const [mRes, pRes, sRes] = await Promise.all([
      api(`league_matches?id=eq.${matchId}&select=*`),
      api(`league_players?match_id=eq.${matchId}&select=*&order=team.asc,slot.asc`),
      api(`league_scores?match_id=eq.${matchId}&select=*`)
    ]);
    const [match] = await mRes.json();
    const players = await pRes.json();
    const rawScores = await sRes.json();

    const holeSeq = buildHoleSequence(match.start_hole);
    const scores = {};
    rawScores.forEach(s => {
      scores[`${s.player_id}_${s.hole_num}`] = { gross: s.gross, net: s.net };
    });

    const r = calcResults(match, players, scores, holeSeq);
    const teamA = players.filter(p => p.team === 'A');
    const teamB = players.filter(p => p.team === 'B');

    // Update hero
    document.getElementById('heroTitle').innerHTML = `${match.team_a_name} <em>vs</em> ${match.team_b_name}`;
    document.getElementById('heroDesc').textContent = `${match.name} · ${match.date}`;

    // Winner banner
    let winnerHTML = '';
    if (r.allScored) {
      let winnerText, scoreText;
      if (r.overallWinner === 'T') {
        winnerText = 'Match Tied';
        scoreText = `${r.ptA} – ${r.ptB} · All square`;
      } else {
        const wTeam = r.overallWinner === 'A' ? match.team_a_name : match.team_b_name;
        const wPts = r.overallWinner === 'A' ? r.ptA : r.ptB;
        const lPts = r.overallWinner === 'A' ? r.ptB : r.ptA;
        winnerText = `${wTeam} Wins`;
        scoreText = `${wPts} – ${lPts} Points`;
      }
      winnerHTML = `
        <div class="winner-banner">
          <div class="winner-eyebrow">Match Complete</div>
          <div class="winner-name">${winnerText}</div>
          <div class="winner-score">${scoreText}</div>
          <div class="winner-match">${match.name} · ${match.date}</div>
        </div>`;
    }

    // Points breakdown table
    const pointsHTML = `
      <div class="result-card">
        <div class="result-header">
          <div>
            <div class="result-title">Points Breakdown</div>
            <div class="result-sub">3 points available</div>
          </div>
          <div class="result-header-right">
            <a class="btn btn-sm" href="league_scorecard.html?match=${matchId}" style="text-decoration:none;">✏ Edit Scorecard</a>
          </div>
        </div>
        <table class="result-table">
          <thead>
            <tr>
              <th>Category</th>
              <th>${match.team_a_name}</th>
              <th>${match.team_b_name}</th>
            </tr>
          </thead>
          <tbody>
            <tr class="result-team-a">
              <td>
                <strong>Low Ball</strong>
                <div style="font-family:'Lato',sans-serif;font-size:10px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-top:2px;">Best net per hole · ${r.lbA}–${r.lbB}${r.lbT ? ` (${r.lbT} tied)` : ''}</div>
              </td>
              <td>${chip(r.lbWinner, 'A')}</td>
              <td>${chip(r.lbWinner, 'B')}</td>
            </tr>
            <tr class="result-team-b">
              <td>
                <strong>Low Hole</strong>
                <div style="font-family:'Lato',sans-serif;font-size:10px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-top:2px;">Combined net per hole · ${r.lhA}–${r.lhB}${r.lhT ? ` (${r.lhT} tied)` : ''}</div>
              </td>
              <td>${chip(r.lhWinner, 'A')}</td>
              <td>${chip(r.lhWinner, 'B')}</td>
            </tr>
            <tr class="result-team-a">
              <td>
                <strong>Team Net Score</strong>
                <div style="font-family:'Lato',sans-serif;font-size:10px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-top:2px;">
                  ${r.allScored ? `${match.team_a_name}: ${r.aTotalNet} · ${match.team_b_name}: ${r.bTotalNet}` : 'Round in progress'}
                </div>
              </td>
              <td>${r.tnWinner ? chip(r.tnWinner, 'A') : '<span style="color:var(--text-muted);font-family:Lato,sans-serif;font-size:11px;">—</span>'}</td>
              <td>${r.tnWinner ? chip(r.tnWinner, 'B') : '<span style="color:var(--text-muted);font-family:Lato,sans-serif;font-size:11px;">—</span>'}</td>
            </tr>
            <tr class="result-total-row">
              <td>Total Points</td>
              <td>${r.ptA}</td>
              <td>${r.ptB}</td>
            </tr>
          </tbody>
        </table>
      </div>`;

    // Hole-by-hole scorecard
    function netCell(val, hasStroke) {
      if (val === undefined || val === null) return `<td class="sc-cell-empty">—</td>`;
      return `<td${hasStroke ? ' class="sc-cell-stroke"' : ''}>${val}${hasStroke ? '•' : ''}</td>`;
    }

    const holeHeaders = holeSeq.map(h => `<th>${h.num}<br><span style="font-weight:400;opacity:0.7;">${h.name.substring(0,4)}</span></th>`).join('');
    const parRow = `<tr class="sc-par"><td class="sc-name-cell" style="text-align:left;">Par</td>${holeSeq.map(h => `<td>${h.par}</td>`).join('')}<td></td></tr>`;
    const hdcpRow = `<tr class="sc-par"><td class="sc-name-cell" style="text-align:left;">Hdcp</td>${holeSeq.map(h => `<td>${h.hdcp}</td>`).join('')}<td></td></tr>`;

    function playerRow(player, rowClass) {
      const cells = holeSeq.map(h => {
        const s = scores[`${player.id}_${h.num}`];
        const hasStroke = getStrokesOnHole(player.strokes_off, h.hdcp, holeSeq) > 0;
        return netCell(s?.net, hasStroke);
      }).join('');
      const total = holeSeq.reduce((sum, h) => sum + (scores[`${player.id}_${h.num}`]?.net || 0), 0);
      const hasAny = holeSeq.some(h => scores[`${player.id}_${h.num}`] !== undefined);
      return `<tr class="${rowClass}">
        <td class="sc-name-cell">${player.name}<br><span style="font-family:'Lato',sans-serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);">${player.strokes_off > 0 ? `${player.strokes_off} off` : 'scratch'}</span></td>
        ${cells}
        <td class="sc-total">${hasAny ? total : '—'}</td>
      </tr>`;
    }

    // Hole winner row
    const lbWinnerRow = `<tr class="sc-par"><td class="sc-name-cell" style="text-align:left;">Low Ball</td>${r.holeDetails.map(d => {
      if (!d.lbWinner) return `<td class="sc-cell-empty">—</td>`;
      if (d.lbWinner === 'T') return `<td style="color:var(--gold);font-size:11px;">T</td>`;
      return `<td style="font-family:'Lato',sans-serif;font-size:10px;font-weight:700;color:${d.lbWinner==='A'?'var(--green-mid)':'#8b4c2a'};">${d.lbWinner==='A' ? match.team_a_name.substring(0,3) : match.team_b_name.substring(0,3)}</td>`;
    }).join('')}<td></td></tr>`;

    const lhWinnerRow = `<tr class="sc-par"><td class="sc-name-cell" style="text-align:left;">Low Hole</td>${r.holeDetails.map(d => {
      if (!d.lhWinner) return `<td class="sc-cell-empty">—</td>`;
      if (d.lhWinner === 'T') return `<td style="color:var(--gold);font-size:11px;">T</td>`;
      return `<td style="font-family:'Lato',sans-serif;font-size:10px;font-weight:700;color:${d.lhWinner==='A'?'var(--green-mid)':'#8b4c2a'};">${d.lhWinner==='A' ? match.team_a_name.substring(0,3) : match.team_b_name.substring(0,3)}</td>`;
    }).join('')}<td></td></tr>`;

    const scorecardHTML = `
      <div class="scorecard-card">
        <div class="scorecard-header">
          <div class="scorecard-title">Hole-by-Hole Net Scores</div>
          <div class="scorecard-sub">• = stroke received on this hole</div>
        </div>
        <div style="overflow-x:auto;">
        <table class="sc-table">
          <thead>
            <tr><th class="sc-name">Player</th>${holeHeaders}<th>Total</th></tr>
          </thead>
          <tbody>
            ${parRow}
            ${hdcpRow}
            ${teamA.map(p => playerRow(p, 'sc-team-a-row')).join('')}
            ${teamB.map(p => playerRow(p, 'sc-team-b-row')).join('')}
            ${lbWinnerRow}
            ${lhWinnerRow}
          </tbody>
        </table>
        </div>
        <div style="padding:10px 16px;border-top:1px solid var(--border);font-family:'Lato',sans-serif;font-size:10px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;">
          Team A: ${match.team_a_name} (${teamA.map(p=>p.name).join(', ')}) &nbsp;·&nbsp; Team B: ${match.team_b_name} (${teamB.map(p=>p.name).join(', ')})
        </div>
      </div>`;

    document.getElementById('mainContent').innerHTML =
      `<div class="lookup-bar">
        <label for="codeInput">Match Code</label>
        <input type="text" id="codeInput" maxlength="3" placeholder="---" value="${match.code}" oninput="this.value=this.value.toUpperCase()">
        <button class="btn btn-gold" onclick="loadByCode()">Load Results</button>
      </div>
      <div class="msg" id="lookupMsg"></div>` +
      winnerHTML +
      pointsHTML +
      scorecardHTML;

  } catch(err) {
    console.error(err);
    document.getElementById('mainContent').innerHTML = '<div class="loading-card"><div class="loading-text">Failed to load results.</div></div>';
  }
}

// Auto-load from URL param
const params = new URLSearchParams(window.location.search);
const matchId = params.get('match');
const code = params.get('code');

if (matchId) {
  document.getElementById('mainContent').innerHTML =
    `<div class="lookup-bar">
      <label for="codeInput">Match Code</label>
      <input type="text" id="codeInput" maxlength="3" placeholder="---" oninput="this.value=this.value.toUpperCase()">
      <button class="btn btn-gold" onclick="loadByCode()">Load Results</button>
    </div>
    <div class="msg" id="lookupMsg"></div>
    <div class="loading-card"><div class="loading-text">Loading match…</div></div>`;
  renderResults(matchId);
} else if (code) {
  document.getElementById('codeInput').value = code;
  loadByCode();
}

window.loadByCode = async function() {
  const codeEl = document.getElementById('codeInput');
  if (!codeEl) return;
  const c = codeEl.value.trim().toUpperCase();
  const msgEl = document.getElementById('lookupMsg');
  if (c.length !== 3) {
    if (msgEl) { msgEl.textContent = 'Please enter a 3-character match code.'; msgEl.className = 'msg error show'; }
    return;
  }
  if (msgEl) msgEl.className = 'msg';
  try {
    const res = await api(`league_matches?code=eq.${c}&select=*`);
    const matches = await res.json();
    if (!matches.length) {
      if (msgEl) { msgEl.textContent = 'Match not found.'; msgEl.className = 'msg error show'; }
      return;
    }
    await renderResults(matches[0].id);
  } catch(err) {
    if (msgEl) { msgEl.textContent = 'Could not connect. Try again.'; msgEl.className = 'msg error show'; }
  }
};

// Theme
const themeButtons = document.querySelectorAll('[data-theme-option]');
const storedTheme = localStorage.getItem('monument-theme');
const initialTheme = storedTheme === 'augusta' || storedTheme === 'shadows' ? storedTheme : 'augusta';
function applyTheme(theme) {
  document.body.setAttribute('data-theme', theme);
  themeButtons.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.themeOption === theme);
    btn.setAttribute('aria-pressed', String(btn.dataset.themeOption === theme));
  });
  localStorage.setItem('monument-theme', theme);
}
themeButtons.forEach(btn => btn.addEventListener('click', () => applyTheme(btn.dataset.themeOption)));
applyTheme(initialTheme);
</script>
</body>
</html>
