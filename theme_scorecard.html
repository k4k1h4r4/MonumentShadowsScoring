<style>
  :root {

  .header-controls { display:flex; align-items:center; gap:18px; }

  .theme-button { appearance:none; border:none; background:transparent; color:var(--text-muted); font-family:'Lato',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; padding:9px 14px; border-radius:999px; cursor:pointer; transition: background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease; }
  .theme-button.active { background: linear-gradient(180deg, rgba(201,168,76,0.28) 0%, rgba(201,168,76,0.12) 100%); color: var(--white); box-shadow: inset 0 0 0 1px rgba(201,168,76,0.24), 0 6px 14px rgba(0,0,0,0.12); }
  body[data-theme="shadows"] { --green-deep:#0d1117; --green-mid:#232c39; --green-light:#7f8ca3; --green-pale:#171c23; --gold:#b58a56; --gold-light:#e8d6bb; --white:#f4efe6; --cream:#0f141b; --charcoal:#05070a; --text-body:#ece1d4; --text-muted:#a9b0bb; --border:#3a4657; --birdie:#7fb4ff; --eagle:#9ac7ff; --bogey:#d98274; --double:#a04e49; --error:#d98274; }
  body[data-theme="shadows"] { background: linear-gradient(180deg, #0b0f14 0%, #10151c 45%, #121821 100%); color: var(--text-body); }
  body[data-theme="shadows"] header, body[data-theme="shadows"] .hole-nav, body[data-theme="shadows"] .running-total, body[data-theme="shadows"] .live-bar, body[data-theme="shadows"] .top-bar { background: #0d1117; border-color: var(--gold); }
  body[data-theme="shadows"] .card, body[data-theme="shadows"] .score-input-block, body[data-theme="shadows"] .lookup-bar, body[data-theme="shadows"] .event-code-display, body[data-theme="shadows"] .lookup-inner input, body[data-theme="shadows"] .join-code-input, body[data-theme="shadows"] input, body[data-theme="shadows"] select, body[data-theme="shadows"] .mini-scorecard table, body[data-theme="shadows"] table.lb tbody tr, body[data-theme="shadows"] .event-header, body[data-theme="shadows"] .lb-empty { background: rgba(19,25,34,0.96); color: var(--text-body); border-color: var(--border); }
  body[data-theme="shadows"] nav a { color: rgba(232,224,210,0.72); }

  body[data-theme="shadows"] .logo-name, body[data-theme="shadows"] .card h2, body[data-theme="shadows"] .hole-name-display, body[data-theme="shadows"] .event-title, body[data-theme="shadows"] .lb-name, body[data-theme="shadows"] .hero-title { color: var(--white); }
  body[data-theme="shadows"] .card p, body[data-theme="shadows"] .hole-meta-lbl, body[data-theme="shadows"] .rt-label, body[data-theme="shadows"] .rt-par, body[data-theme="shadows"] .lookup-event-name, body[data-theme="shadows"] .lb-thru, body[data-theme="shadows"] .event-meta-item, body[data-theme="shadows"] label, body[data-theme="shadows"] .msg, body[data-theme="shadows"] .lb-empty { color: var(--text-muted); }
  body[data-theme="shadows"] .btn, body[data-theme="shadows"] .save-btn, body[data-theme="shadows"] .lookup-inner button { background: #171f2a; }

  /* SCORE INPUT */
  .score-input-block {
    background: var(--white);
    border: 1px solid var(--border);

    font-family: 'Lato', sans-serif;
    font-size: 10px;

    width: 60px;
    height: 60px;

  .save-btn {
    width: 100%;

  }
  .save-btn:hover { background: var(--green-mid); }
  .save-btn.editing { background: var(--gold); color: var(--green-deep); }

  /* RUNNING TOTAL BAR */
  .running-total {
    margin-top: 20px;

  /* SCORECARD MINI */
  .mini-scorecard {
    margin-top: 20px;
    overflow-x: auto;
  }
  .mini-scorecard table {
    width: 100%;

    letter-spacing: 1px;
  }
  .mini-scorecard td.par-row { background: rgba(201,168,76,0.12); color: var(--text-muted); font-size: 11px; }
  .mini-scorecard td.score-cell { font-weight: 700; }
  .mini-scorecard td.score-cell.under { color: var(--birdie); }
  .mini-scorecard td.score-cell.over  { color: var(--bogey); }
  .mini-scorecard td.score-cell.even  { color: var(--green-mid); }
  .mini-scorecard td.score-cell.empty { color: var(--border); }
  .mini-scorecard td.total { background: var(--green-pale); font-weight: 700; border-color: var(--green-mid); }
  .mini-scorecard .current-hole { background: rgba(201,168,76,0.15); }

  /* COMPLETE STATE */
  .round-complete {
    text-align: center;
    padding: 48px 24px;
    background: var(--white);
    border: 1px solid var(--border);
  }
  .round-complete h2 {

  .round-complete a {

  .round-complete a:hover { background: var(--green-mid); }
</style>

<header>

    <div class="header-entry" id="headerEntry">Loading...</div>

<div id="holeNav" class="hole-nav"></div>

<div class="score-wrap" id="mainContent">
  <div class="loading">Loading round data...</div>
</div>

<script>
const SUPABASE_URL = 'https://znqnnaslskjewfxcswxw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0pVZp5JcAc9lSIClZD5eqQ_9Q33F7Uf';

const HOLES = [
  { num:1,  name:"Omen",       par:4, hdcp:9,  blue:354, gold:382, white:316, red:253 },
  { num:2,  name:"Hemlock",    par:3, hdcp:11, blue:195, gold:245, white:175, red:155 },
  { num:3,  name:"Badlands",   par:4, hdcp:15, blue:300, gold:310, white:282, red:230 },
  { num:4,  name:"Sentinel",   par:5, hdcp:5,  blue:528, gold:545, white:472, red:457 },
  { num:5,  name:"Strangle",   par:4, hdcp:1,  blue:403, gold:434, white:366, red:316 },
  { num:6,  name:"Rhumba",     par:4, hdcp:13, blue:303, gold:317, white:268, red:227 },
  { num:7,  name:"Flicker",    par:3, hdcp:17, blue:157, gold:168, white:145, red:132 },
  { num:8,  name:"Balderdash", par:5, hdcp:3,  blue:545, gold:600, white:475, red:430 },
  { num:9,  name:"Darkfall",   par:4, hdcp:7,  blue:352, gold:387, white:320, red:259 },
  { num:10, name:"Harbinger",  par:4, hdcp:14, blue:368, gold:410, white:322, red:292 },
  { num:11, name:"Exile",      par:4, hdcp:2,  blue:399, gold:436, white:353, red:313 },
  { num:12, name:"Shroud",     par:5, hdcp:8,  blue:475, gold:512, white:422, red:375 },
  { num:13, name:"Lure",       par:3, hdcp:18, blue:142, gold:160, white:123, red:101 },
  { num:14, name:"Obscura",    par:4, hdcp:6,  blue:397, gold:427, white:350, red:316 },
  { num:15, name:"Mercy",      par:4, hdcp:16, blue:324, gold:357, white:287, red:235 },
  { num:16, name:"Dirge",      par:5, hdcp:4,  blue:510, gold:560, white:460, red:410 },
  { num:17, name:"Rotwind",    par:3, hdcp:12, blue:178, gold:203, white:157, red:123 },
  { num:18, name:"Reckoning",  par:4, hdcp:10, blue:378, gold:417, white:324, red:277 },
];

function api(path, options = {}) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...options.headers
    }
  });
}

// Build hole sequence based on event settings
function buildSequence(startHole, totalHoles) {
  if (totalHoles === 18) {
    const seq = [];
    for (let i = 0; i < 18; i++) seq.push(((startHole - 1 + i) % 18) + 1);
    return seq;
  }
  // 9 holes — stay within front or back nine
  const isFront = startHole <= 9;
  const low = isFront ? 1 : 10;
  const high = isFront ? 9 : 18;
  const range = high - low + 1; // always 9
  const seq = [];
  for (let i = 0; i < 9; i++) {
    seq.push(low + ((startHole - low + i) % range));
  }
  return seq;
}

function holeData(num) { return HOLES[num - 1]; }

function scoreRelation(strokes, par) {
  const diff = strokes - par;
  if (diff <= -2) return { label: diff === -2 ? 'Eagle' : 'Albatross', cls: 'eagle' };
  if (diff === -1) return { label: 'Birdie', cls: 'birdie' };
  if (diff === 0)  return { label: 'Par', cls: 'par' };
  if (diff === 1)  return { label: 'Bogey', cls: 'bogey' };
  if (diff === 2)  return { label: 'Double Bogey', cls: 'double' };
  return { label: `+${diff}`, cls: 'worse' };
}

function parToString(diff) {
  if (diff === 0) return 'E';
  return diff > 0 ? `+${diff}` : `${diff}`;
}

// STATE
let event, entry, sequence, scores = {}, currentIdx = 0, editingIdx = null, pendingStrokes = null;

const params = new URLSearchParams(location.search);
const entryId = params.get('entry');
const eventId  = params.get('event');

async function init() {
  if (!entryId || !eventId) {
    document.getElementById('mainContent').innerHTML = '<div class="loading">Invalid link. <a href="theme_scoring_hub.html">Return home</a></div>';
    return;
  }

  // Load event + entry
  const [evRes, enRes, scRes] = await Promise.all([
    api(`events?id=eq.${eventId}&select=*`),
    api(`entries?id=eq.${entryId}&select=*`),
    api(`scores?entry_id=eq.${entryId}&select=*`)
  ]);

  const [evData, enData, scData] = await Promise.all([evRes.json(), enRes.json(), scRes.json()]);
  event = evData[0];
  entry = enData[0];

  if (!event || !entry) {
    document.getElementById('mainContent').innerHTML = '<div class="loading">Round not found. <a href="theme_scoring_hub.html">Return home</a></div>';
    return;
  }

  // Map scores by hole number
  scData.forEach(s => { scores[s.hole] = s.strokes; });

  // Build sequence
  sequence = buildSequence(event.start_hole, event.holes);

  // Determine current hole index (first without a score)
  currentIdx = sequence.findIndex(h => !scores[h]);
  if (currentIdx === -1) currentIdx = sequence.length; // all done

  document.getElementById('headerEntry').textContent = entry.name;

  renderNav();
  renderScoringArea(editingIdx !== null ? editingIdx : Math.min(currentIdx, sequence.length - 1));
}

function renderNav() {
  const nav = document.getElementById('holeNav');
  nav.innerHTML = '';
  sequence.forEach((holeNum, idx) => {
    const pip = document.createElement('div');
    pip.className = 'hole-pip';
    pip.textContent = holeNum;

    const sc = scores[holeNum];
    if (idx > currentIdx) {
      pip.classList.add('future');
    } else if (idx === currentIdx && currentIdx < sequence.length) {
      pip.classList.add('current');
    } else if (sc !== undefined) {
      const par = holeData(holeNum).par;
      const diff = sc - par;
      pip.classList.add(diff < 0 ? 'under' : diff > 0 ? 'over' : 'even');
      pip.title = `${sc} (${parToString(diff)})`;
      pip.addEventListener('click', () => { editingIdx = idx; renderScoringArea(idx); renderNav(); });
    }

    nav.appendChild(pip);
  });

  // Scroll current into view
  const active = nav.children[Math.min(currentIdx, sequence.length - 1)];
  if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth' });
}

function renderScoringArea(idx) {
  const main = document.getElementById('mainContent');

  if (currentIdx >= sequence.length) {
    renderComplete(main);
    return;
  }

  const holeNum = sequence[idx];
  const hole = holeData(holeNum);
  const isEditing = idx < currentIdx;
  const existingScore = scores[holeNum] || hole.par;
  pendingStrokes = existingScore;

  const teeKey = event.tee.toLowerCase();
  const yardage = hole[teeKey] || hole.blue;

  // Compute running total through completed holes
  let totalStrokes = 0, totalPar = 0;
  sequence.slice(0, currentIdx).forEach(h => {
    totalStrokes += scores[h] || 0;
    totalPar += holeData(h).par;
  });
  const runningDiff = totalStrokes - totalPar;

  // Build mini scorecard rows
  let thRow = '<tr>', parRow = '<tr><td class="par-row" style="text-align:left;padding-left:8px;font-family:\'Lato\',sans-serif;font-size:9px;letter-spacing:1px;">PAR</td>', scRow = '<tr><td style="text-align:left;padding-left:8px;font-family:\'Lato\',sans-serif;font-size:9px;letter-spacing:1px;">SCR</td>';
  thRow += '<th></th>';
  let totalSc = 0, totalPr = 0;
  sequence.forEach((h, i) => {
    const hd = holeData(h);
    const isCurrent = i === idx;
    const sc = scores[h];
    const diff = sc !== undefined ? sc - hd.par : null;
    const cls = diff === null ? 'empty' : diff < 0 ? 'under' : diff > 0 ? 'over' : 'even';
    thRow += `<th${isCurrent ? ' style="background:rgba(201,168,76,0.2)"' : ''}>${h}</th>`;
    parRow += `<td class="par-row${isCurrent ? ' current-hole' : ''}">${hd.par}</td>`;
    scRow += `<td class="score-cell ${cls}${isCurrent ? ' current-hole' : ''}">${sc !== undefined ? sc : '·'}</td>`;
    if (sc !== undefined) { totalSc += sc; totalPr += hd.par; }
  });
  thRow += '<th>TOT</th></tr>';
  parRow += `<td class="par-row total">${sequence.reduce((a,h) => a + holeData(h).par, 0)}</td></tr>`;
  scRow += `<td class="score-cell total ${totalSc > totalPr ? 'over' : totalSc < totalPr ? 'under' : 'even'}">${totalSc || '·'}</td></tr>`;

  main.innerHTML = `
    <div class="hole-header">
      <div class="hole-number-display">Hole ${holeNum} · ${event.tee} Tee</div>
      <div class="hole-name-display">${hole.name}</div>
      <div class="hole-meta">
        <div class="hole-meta-item">
          <span class="hole-meta-val">${hole.par}</span>
          <span class="hole-meta-lbl">Par</span>
        </div>
        <div class="hole-meta-item">
          <span class="hole-meta-val">${yardage}</span>
          <span class="hole-meta-lbl">Yards</span>
        </div>
        <div class="hole-meta-item">
          <span class="hole-meta-val">${hole.hdcp}</span>
          <span class="hole-meta-lbl">Handicap</span>
        </div>
      </div>
      <div class="hole-rule"></div>
    </div>

    <div class="score-input-block">
      <span class="score-label">${isEditing ? 'Edit Score · Hole ' + holeNum : 'Enter Score · Hole ' + holeNum}</span>
      <div class="score-controls">
        <button class="score-btn" id="btnMinus" onclick="adjustScore(-1)">−</button>
        <span class="score-value" id="scoreVal">${pendingStrokes}</span>
        <button class="score-btn" id="btnPlus" onclick="adjustScore(1)">+</button>
      </div>
      <div class="score-relation" id="scoreRelation"></div>
      <button class="save-btn${isEditing ? ' editing' : ''}" onclick="saveScore(${idx})">${isEditing ? 'Update Score' : 'Save &amp; Next Hole'}</button>
    </div>

    <div class="running-total">
      <div>
        <div class="rt-label">Running Total</div>
        <div class="rt-par">${currentIdx} of ${sequence.length} holes</div>
      </div>
      <div style="text-align:right">
        <div class="rt-value">${totalStrokes || '—'}</div>
        <div class="rt-par">${currentIdx > 0 ? parToString(runningDiff) + ' (par ' + totalPar + ')' : 'No holes completed'}</div>
      </div>
    </div>

    <div class="mini-scorecard">
      <table>
        <thead>${thRow}</thead>
        <tbody>
          ${parRow}
          ${scRow}
        </tbody>
      </table>
    </div>
  `;

  updateScoreDisplay();
}

function adjustScore(delta) {
  pendingStrokes = Math.max(1, pendingStrokes + delta);
  updateScoreDisplay();
}

function updateScoreDisplay() {
  const holeNum = sequence[editingIdx !== null ? editingIdx : currentIdx];
  if (!holeNum) return;
  const par = holeData(holeNum).par;
  document.getElementById('scoreVal').textContent = pendingStrokes;
  document.getElementById('btnMinus').disabled = pendingStrokes <= 1;

  const rel = scoreRelation(pendingStrokes, par);
  document.getElementById('scoreRelation').innerHTML = `<span class="pill ${rel.cls}">${rel.label}</span>`;
}

async function saveScore(idx) {
  const holeNum = sequence[idx];
  const isEditing = idx < currentIdx;

  // Check if score already exists
  const existing = scores[holeNum];

  let res;
  if (existing !== undefined) {
    // Update
    res = await api(`scores?entry_id=eq.${entryId}&hole=eq.${holeNum}`, {
      method: 'PATCH',
      body: JSON.stringify({ strokes: pendingStrokes }),
      headers: { 'Prefer': 'return=representation' }
    });
  } else {
    // Insert
    res = await api('scores', {
      method: 'POST',
      body: JSON.stringify({ entry_id: entryId, event_id: eventId, hole: holeNum, strokes: pendingStrokes })
    });
  }

  if (!res.ok) { alert('Error saving score. Please try again.'); return; }

  scores[holeNum] = pendingStrokes;
  editingIdx = null;

  if (!isEditing) {
    currentIdx = sequence.findIndex(h => !scores[h]);
    if (currentIdx === -1) currentIdx = sequence.length;
  }

  renderNav();
  renderScoringArea(editingIdx !== null ? editingIdx : Math.min(currentIdx, sequence.length - 1));
}

function renderComplete(main) {
  let total = 0, parTotal = 0;
  sequence.forEach(h => {
    total += scores[h] || 0;
    parTotal += holeData(h).par;
  });
  const diff = total - parTotal;

  main.innerHTML = `
    <div class="round-complete">
      <div style="font-family:'Lato',sans-serif;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;">Round Complete</div>
      <h2>${entry.name}</h2>
      <span class="final-score">${total}</span>
      <div class="final-par">${parToString(diff)} · Par ${parTotal}</div>
      <a href="leaderboard.html?code=${event.code}">View Leaderboard →</a>
    </div>

    <div style="margin-top:20px;">
      <div class="mini-scorecard">
        ${buildFinalScorecard()}
      </div>
    </div>
  `;
}

function buildFinalScorecard() {
  let thRow = '<tr><th></th>', parRow = '<tr><td class="par-row" style="text-align:left;padding-left:8px;font-family:\'Lato\',sans-serif;font-size:9px;letter-spacing:1px;">PAR</td>', scRow = '<tr><td style="text-align:left;padding-left:8px;font-family:\'Lato\',sans-serif;font-size:9px;letter-spacing:1px;">SCR</td>';
  let totalSc = 0, totalPr = 0;
  sequence.forEach(h => {
    const hd = holeData(h); const sc = scores[h]; const diff = sc - hd.par;
    thRow += `<th>${h}</th>`;
    parRow += `<td class="par-row">${hd.par}</td>`;
    scRow += `<td class="score-cell ${diff<0?'under':diff>0?'over':'even'}">${sc}</td>`;
    totalSc += sc; totalPr += hd.par;
  });
  thRow += '<th>TOT</th></tr>';
  parRow += `<td class="par-row total">${totalPr}</td></tr>`;
  const td = totalSc - totalPr;
  scRow += `<td class="score-cell total ${td<0?'under':td>0?'over':'even'}">${totalSc}</td></tr>`;
  return `<table><thead>${thRow}</thead><tbody>${parRow}${scRow}</tbody></table>`;
}

init();

const themeButtons = document.querySelectorAll('[data-theme-option]');
const storedTheme = localStorage.getItem('monument-theme');
const initialTheme = storedTheme === 'augusta' || storedTheme === 'shadows' ? storedTheme : 'augusta';
function applyTheme(theme) {
  document.body.setAttribute('data-theme', theme);
  themeButtons.forEach(button => {
    const isActive = button.dataset.themeOption === theme;
    button.classList.toggle('active', isActive);
    button.setAttribute('aria-pressed', String(isActive));
  });
  localStorage.setItem('monument-theme', theme);
}
themeButtons.forEach(button => button.addEventListener('click', () => applyTheme(button.dataset.themeOption)));
applyTheme(initialTheme);

</script>
</body>
</html>
