<script>
const SUPABASE_URL = 'https://znqnnaslskjewfxcswxw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0pVZp5JcAc9lSIClZD5eqQ_9Q33F7Uf';

const HOLES = [
  { num:1,  name:"Omen",       par:4, hdcp:9  },
  { num:2,  name:"Hemlock",    par:3, hdcp:11 },
  { num:3,  name:"Badlands",   par:4, hdcp:15 },
  { num:4,  name:"Sentinel",   par:5, hdcp:5  },
  { num:5,  name:"Strangle",   par:4, hdcp:1  },
  { num:6,  name:"Rhumba",     par:4, hdcp:13 },
  { num:7,  name:"Flicker",    par:3, hdcp:17 },
  { num:8,  name:"Balderdash", par:5, hdcp:3  },
  { num:9,  name:"Darkfall",   par:4, hdcp:7  },
  { num:10, name:"Harbinger",  par:4, hdcp:14 },
  { num:11, name:"Exile",      par:4, hdcp:2  },
  { num:12, name:"Shroud",     par:5, hdcp:8  },
  { num:13, name:"Lure",       par:3, hdcp:18 },
  { num:14, name:"Obscura",    par:4, hdcp:6  },
  { num:15, name:"Mercy",      par:4, hdcp:16 },
  { num:16, name:"Dirge",      par:5, hdcp:4  },
  { num:17, name:"Rotwind",    par:3, hdcp:12 },
  { num:18, name:"Reckoning",  par:4, hdcp:10 }
];

function api(path) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
}

function buildSequence(startHole, totalHoles) {
  if (totalHoles === 18) {
    return Array.from({length: 18}, (_, i) => ((startHole - 1 + i) % 18) + 1);
  }
  const isFront = startHole <= 9;
  const low = isFront ? 1 : 10;
  const high = isFront ? 9 : 18;
  const range = high - low + 1;
  return Array.from({length: 9}, (_, i) => low + ((startHole - low + i) % range));
}

function parToString(diff) {
  if (diff === 0) return 'E';
  return diff > 0 ? `+${diff}` : `${diff}`;
}

function formatLocalDate(dateStr, options = { month:'short', day:'numeric', year:'numeric' }) {
  if (!dateStr) return '—';
  return new Date(`${dateStr}T12:00:00`).toLocaleDateString('en-US', options);
}

let currentEvent = null;
let refreshInterval = null;
let refreshCountdown = 30;
let countdownInterval = null;

async function loadRecentEvents() {
  const lbWrap = document.getElementById('lbWrap');
  lbWrap.innerHTML = '<div class="loading-lb">Loading recent events...</div>';
  document.getElementById('eventHeader').classList.remove('show');
  document.getElementById('lookupEventName').textContent = 'Recent events';

  try {
    const res = await api('events?select=*&order=date.desc&limit=10');
    const events = await res.json();

    if (!events.length) {
      lbWrap.innerHTML = '<div class="lb-empty">No recent events found.</div>';
      return;
    }

    const rows = events.map(event => `
      <tr>
        <td><div class="lb-name">${event.name || 'Untitled Event'}</div><div class="lb-thru">Code ${event.code || '—'}</div></td>
        <td class="right"><div class="lb-total">${formatLocalDate(event.date)}</div></td>
        <td class="right"><div class="lb-total">${event.holes || '—'} Holes</div></td>
        <td class="right"><button class="btn event-select-btn" style="width:auto;margin-top:0;padding:10px 16px;" onclick="selectEventByCode('${event.code || ''}')">View</button></td>
      </tr>
    `).join('');

    lbWrap.innerHTML = `
      <table class="lb">
        <thead>
          <tr>
            <th>Event</th>
            <th class="right" style="width:140px">Date</th>
            <th class="right" style="width:120px">Format</th>
            <th class="right" style="width:100px">Open</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch (err) {
    console.error('Recent events error:', err);
    lbWrap.innerHTML = '<div class="lb-empty">Could not load recent events.</div>';
  }
}

function selectEventByCode(code) {
  if (!code) return;
  history.replaceState({}, '', `?code=${code}`);
  loadLeaderboardByCode(code);
}

async function loadLeaderboardByCode(codeArg) {
  const code = (codeArg || '').trim().toUpperCase();
  if (code.length !== 3) return;

  const evRes = await api(`events?code=eq.${code}&select=*`);
  const events = await evRes.json();
  if (!events.length) {
    document.getElementById('lookupEventName').textContent = 'Event not found.';
    document.getElementById('eventHeader').classList.remove('show');
    document.getElementById('lbWrap').innerHTML = '<div class="lb-empty">No event found for that code.</div>';
    return;
  }

  currentEvent = events[0];
  document.getElementById('eventHeader').classList.add('show');
  document.getElementById('eventTitle').textContent = currentEvent.name;
  document.getElementById('metaDate').textContent = formatLocalDate(currentEvent.date, { weekday:'short', month:'long', day:'numeric' });
  document.getElementById('metaHoles').textContent = `${currentEvent.holes} Holes · Stroke Play`;
  document.getElementById('metaStart').textContent = 'Player-selected';
  document.getElementById('lookupEventName').textContent = `${currentEvent.name} · Code ${currentEvent.code}`;

  await refreshData();
  startAutoRefresh();
}

async function refreshData() {
  if (!currentEvent) return;
  const lbWrap = document.getElementById('lbWrap');

  const [enRes, scRes] = await Promise.all([
    api(`entries?event_id=eq.${currentEvent.id}&select=*&order=created_at.asc`),
    api(`scores?event_id=eq.${currentEvent.id}&select=*`)
  ]);
  const entries = await enRes.json();
  const allScores = await scRes.json();

  if (!entries.length) {
    lbWrap.innerHTML = '<div class="lb-empty">No entries yet. Share the event code to get started.</div>';
    return;
  }

  const scoreMap = {};
  allScores.forEach(s => {
    if (!scoreMap[s.entry_id]) scoreMap[s.entry_id] = {};
    scoreMap[s.entry_id][s.hole] = s.strokes;
  });

  const standings = entries.map(entry => {
    const seq = buildSequence(entry.start_hole || 1, currentEvent.holes);
    const entryScores = scoreMap[entry.id] || {};
    let totalStrokes = 0, totalPar = 0, holesPlayed = 0;

    seq.forEach(h => {
      const sc = entryScores[h];
      if (sc !== undefined) {
        totalStrokes += sc;
        totalPar += HOLES[h - 1].par;
        holesPlayed++;
      }
    });

    const diff = totalStrokes - totalPar;
    const complete = holesPlayed === seq.length;
    return { entry, seq, entryScores, totalStrokes, totalPar, diff, holesPlayed, complete };
  });

  standings.sort((a, b) => {
    if (a.complete !== b.complete) return a.complete ? -1 : 1;
    if (a.diff !== b.diff) return a.diff - b.diff;
    return b.holesPlayed - a.holesPlayed;
  });

  let pos = 1;
  standings.forEach((s, i) => {
    if (i > 0) {
      const prev = standings[i - 1];
      if (s.diff !== prev.diff || s.complete !== prev.complete || s.holesPlayed !== prev.holesPlayed) pos = i + 1;
    }
    s.position = pos;
  });

  const rows = standings.map(s => {
    const isLeader = s.position === 1;
    const diffStr = s.holesPlayed === 0 ? '—' : parToString(s.diff);
    const diffCls = s.diff < 0 ? 'under' : s.diff > 0 ? 'over' : 'even';
    const thruText = s.holesPlayed === 0 ? 'Not started' : (s.complete ? 'F' : `Thru ${s.holesPlayed}`);
    const thruCls = s.complete ? 'complete' : '';

    const holeCells = s.seq.map(h => {
      const sc = s.entryScores[h];
      if (sc === undefined) return `<div class="lb-hole-cell empty">·</div>`;
      const diff = sc - HOLES[h - 1].par;
      const cls = diff < 0 ? 'under' : diff > 0 ? 'over' : 'even';
      return `<div class="lb-hole-cell ${cls}" title="Hole ${h}: ${sc}">${sc}</div>`;
    }).join('');

    return `
      <tr class="${isLeader ? 'leader' : ''}">
        <td><span class="lb-pos ${isLeader ? 'first' : ''}">${s.position}</span></td>
        <td><div class="lb-name ${isLeader ? 'leader-name' : ''}">${s.entry.name}</div><div class="lb-thru ${thruCls}">${thruText} · Start ${s.entry.start_hole || 1}</div></td>
        <td class="right"><div class="lb-score ${s.holesPlayed > 0 ? diffCls : ''}">${diffStr}</div></td>
        <td class="right"><div class="lb-total">${s.totalStrokes || '—'}</div></td>
        <td class="holes-col"><div class="lb-holes">${holeCells}</div></td>
      </tr>
    `;
  }).join('');

  lbWrap.innerHTML = `
    <table class="lb">
      <thead>
        <tr>
          <th style="width:48px">#</th>
          <th>Player / Team</th>
          <th class="right" style="width:80px">Score</th>
          <th class="right" style="width:60px">Total</th>
          <th class="holes-col" style="width:300px">Holes</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;

  resetCountdown();
}

function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  if (countdownInterval) clearInterval(countdownInterval);
  refreshCountdown = 30;
  refreshInterval = setInterval(refreshData, 30000);
  countdownInterval = setInterval(() => {
    refreshCountdown--;
    document.getElementById('refreshTimer').textContent = `Refreshes in ${refreshCountdown}s`;
    if (refreshCountdown <= 0) resetCountdown();
  }, 1000);
}

function resetCountdown() {
  refreshCountdown = 30;
  document.getElementById('refreshTimer').textContent = 'Refreshes in 30s';
}

const themeButtons = document.querySelectorAll('[data-theme-option]');
const storedTheme = localStorage.getItem('monument-theme');
const initialTheme = storedTheme === 'augusta' || storedTheme === 'shadows' ? storedTheme : 'augusta';
function applyTheme(theme) {
  document.body.setAttribute('data-theme', theme);
  themeButtons.forEach(button => {
    const isActive = button.dataset.themeOption === theme;
    button.classList.toggle('active', isActive);
    button.setAttribute('aria-pressed', String(isActive));
  });
  localStorage.setItem('monument-theme', theme);
}
themeButtons.forEach(button => button.addEventListener('click', () => applyTheme(button.dataset.themeOption)));
applyTheme(initialTheme);

const params = new URLSearchParams(location.search);
const urlCode = params.get('code');
window.addEventListener('DOMContentLoaded', () => {
  if (urlCode) {
    loadLeaderboardByCode(urlCode.toUpperCase());
  } else {
    loadRecentEvents();
  }
});
</script>
